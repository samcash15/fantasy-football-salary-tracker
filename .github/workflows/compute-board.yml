name: Compute and deploy cap board

# Refreshes player VALUES (running-max from Sleeper draft + transactions) into board.json, then
# builds + deploys the site — but only when something actually changed, to stay under Pages'
# deploy limits. Live ROSTER changes (drops/moves) are handled in the browser, which polls
# Sleeper directly, so this job doesn't need to run often.

on:
  schedule:
    # Values only change when waivers process (~9am Central, Wed-Mon, no Tuesday). GitHub cron is
    # UTC with no DST, so we cover both Central offsets and take two attempts (:15 and :45) in case
    # the scheduler lags. One pair always lands ~9:15/9:45am Central; the other runs an hour off and
    # harmlessly finds no change. DOW 0,1,3-6 = Sun,Mon,Wed,Thu,Fri,Sat (skips Tue).
    - cron: '15,45 14 * * 0,1,3-6'   # 9:15/9:45 CDT (summer)  | 8:15/8:45 CST (winter)
    - cron: '15,45 15 * * 0,1,3-6'   # 10:15/10:45 CDT (summer) | 9:15/9:45 CST (winter)
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write   # commit refreshed board.json
  pages: write      # deploy to GitHub Pages
  id-token: write   # Pages deployment uses OIDC

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Unit-test the reconstruction engine before computing/deploying (no deps needed).
      - name: Test reconstruction
        run: npm test

      # Day-stamped cache so the 15MB /players/nfl dump is fetched at most once per day
      # (Sleeper's own guidance), not on every 30-min run.
      - id: date
        run: echo "ymd=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: .cache
          key: players-nfl-${{ steps.date.outputs.ymd }}

      - name: Reconstruct board from Sleeper
        run: node scripts/compute-board.mjs

      - name: Commit board changes (if any)
        id: commit
        run: |
          git config user.name  "cap-board-bot"
          git config user.email "cap-board-bot@users.noreply.github.com"
          git add public/board*.json public/leagues.json
          if git diff --cached --quiet; then
            echo "No board changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh cap board $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Deploy only when the board changed, OR when this is a code push / manual run.
      # (Skips redeploys on quiet scheduled runs, keeping us under Pages' build limits.)
      - name: Build site
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.commit.outputs.changed == 'true' || github.event_name != 'schedule'
        uses: actions/deploy-pages@v4
