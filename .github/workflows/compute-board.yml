name: Compute and deploy cap board

# Pulls Sleeper, reconstructs board.json, commits any change, then builds the Vite site and
# deploys it to GitHub Pages. Runs on a schedule, on pushes to main, and on demand.

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours (UTC). Tighten during the season if you want fresher data.
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write   # commit the refreshed board.json back to the repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # Pages deployment uses OIDC

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Reconstruct board from Sleeper
        run: node scripts/compute-board.mjs

      - name: Commit board changes (if any)
        run: |
          git config user.name  "cap-board-bot"
          git config user.email "cap-board-bot@users.noreply.github.com"
          git add public/board*.json public/leagues.json
          if git diff --cached --quiet; then
            echo "No board changes."
          else
            git commit -m "chore: refresh cap board $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
